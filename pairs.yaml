# ═══════════════════════════════════════════════════════════════════════════════
# Global RPC & fetcher tuning (free-tier Alchemy)
# ═══════════════════════════════════════════════════════════════════════════════

rpc:
  http_url: "${ALCHEMY_HTTP_URL}"
  wss_url:  "${ALCHEMY_WSS_URL}"
  chain_id: 42161

  fetcher:
    chunk_size: 2000
    max_concurrent_requests: 3
    request_delay_ms: 250
    max_retries: 3
    backoff_base_ms: 250
    cache_dir: "~/.defi_flash_bot/cache"

